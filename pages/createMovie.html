<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Agregar Películas</title>
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/estilos.css" />
    <link rel="icon" href="../images/logo-pag.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav
      id="navigation"
      class="navbar navbar-expand-lg navbar-light bg-light border-bottom"
    ></nav>

    <div
      class="container w-50 d-flex justify-content-center shadow-sm p-5"
      id="content"
    >
      <form id="content">
        <fieldset>
          <legend>Información de la Película</legend>

          <div class="mb-3">
            <label for="title" class="form-label">Título:</label>
            <input type="text" id="title" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="year" class="form-label">Año:</label>
            <input type="text" id="year" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="director" class="form-label">Director:</label>
            <input type="text" id="director" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="duration" class="form-label">Duración:</label>
            <input type="text" id="duration" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="genre" class="form-label">Género:</label>
            <input type="text" id="genre" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="rate" class="form-label">Calificación:</label>
            <input type="text" id="rate" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="poster" class="form-label">Póster:</label>
            <input type="text" id="poster" class="form-control" />
          </div>
          <div class="d-flex justify-content-center">
            <button
              type="submit"
              id="sendForm"
              class="btn btn-primary btn-formulario m-3"
            >
              Agregar Película
            </button>
            <button
              type="button"
              id="clear"
              class="btn btn-secondary btn-formulario btn-lg m-3"
            >
              Limpiar
            </button>
          </div>
        </fieldset>
      </form>
    </div>

    <footer>
      <p>&copy; 2024 Mauricio Martinez.</p>
    </footer>
    <script src="../public/bundle.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
